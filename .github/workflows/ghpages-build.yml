name: GitHub Pages Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx ng build --base-href /${{ github.event.repository.name }}/

      # GitHub Pages has no server-side routing — direct URLs and refreshes on
      # sub-routes return 404. Copying index.html as 404.html makes GitHub Pages
      # serve the Angular app for any unknown path, letting the router handle it.
      - name: Copy index.html as 404.html
        run: cp dist/zubarska-ordinacija-frontend/browser/index.html dist/zubarska-ordinacija-frontend/browser/404.html

      # Angular 17 application builder outputs to dist/<name>/browser/ (not dist/<name>/)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/zubarska-ordinacija-frontend/browser
